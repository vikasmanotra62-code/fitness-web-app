<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPro Max - Multi-Language Fitness App</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .lang-select { padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .ad-slot { background: #fff; margin: 10px auto; border: 1px dashed #3498db; width: 95%; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #3498db; border-radius: 8px; }
        .quote-box { background: #fff; padding: 15px; font-style: italic; color: var(--primary); border-left: 5px solid var(--accent); margin: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, select { width: 85%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 90%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; background: var(--accent); }
        #timer-display { font-size: 40px; font-weight: bold; color: var(--error); margin: 10px 0; }
        .footer { background: var(--primary); color: white; padding: 25px; margin-top: 30px; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px;">FitPro Max</div>
    <select class="lang-select" id="langChanger" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="hi">हिन्दी</option>
        <option value="mr">मराठी</option>
        <option value="es">Español</option>
    </select>
</header>

<div class="ad-slot">🚀 Banner Ad (Top)</div>

<div class="quote-box" id="quoteText">"Loading Motivation..."</div>

<div class="main-grid">
    <div class="card">
        <h3 id="t-timer">Workout Timer</h3>
        <select id="exSelect">
            <option value="Pushups">Pushups</option>
            <option value="Squats">Squats</option>
            <option value="Plank">Plank</option>
        </select>
        <div id="timer-display">30</div>
        <button onclick="startWorkout()" id="b-timer" style="background: var(--error);">Start 30s Timer</button>
    </div>

    <div class="card">
        <h3 id="t-bmi">BMI Calculator</h3>
        <input type="number" id="w" placeholder="Weight (kg)">
        <input type="number" id="h" placeholder="Height (cm)">
        <button onclick="calcBMI()" id="b-bmi" style="background: var(--primary);">Check BMI</button>
        <p id="res-bmi" style="font-weight:bold;"></p>
    </div>

    <div class="card">
        <h3 id="t-bmr">BMR Calculator</h3>
        <p style="font-size:12px;" id="d-bmr">Calories your body burns at rest.</p>
        <input type="number" id="bw" placeholder="Weight (kg)">
        <input type="number" id="bh" placeholder="Height (cm)">
        <input type="number" id="ba" placeholder="Age">
        <button onclick="calcBMR()" id="b-bmr" style="background: #8e44ad;">Check BMR</button>
        <p id="res-bmr" style="font-weight:bold;"></p>
    </div>
</div>

<div class="ad-slot" style="min-height: 180px; border-color: #e67e22; color: #e67e22;">🔥 NATIVE (NADI) AD SPACE</div>

<div class="main-grid">
    <div class="card">
        <h3 id="t-water">Water Goal</h3>
        <input type="number" id="wa" placeholder="Age">
        <button onclick="calcWater()" id="b-water" style="background: #2980b9;">Check Goal</button>
        <p id="res-water" style="font-weight:bold;"></p>
    </div>

    <div class="card">
        <h3 id="t-cal">Daily Calories</h3>
        <input type="number" id="cw" placeholder="Weight (kg)">
        <button onclick="calcCal()" id="b-cal" style="background: #d35400;">Check Calories</button>
        <p id="res-cal" style="font-weight:bold;"></p>
    </div>
</div>

<div class="ad-slot">🚀 Banner Ad (Bottom)</div>

<div class="footer">
    FitPro Max Web App - <span id="f-text">Your health, our priority.</span><br>
    &copy; 2026 Quick All Doc Pro Team
</div>

<script>
    const translations = {
        en: { timer: "Workout Timer", start: "Start 30s Timer", bmi: "BMI Calculator", check: "Check BMI", water: "Water Goal", cal: "Daily Calories", bmr: "BMR Calculator", desc: "Your body's rest calories.", foot: "Your health, our priority." },
        hi: { timer: "कसरत टाइमर", start: "30 सेकंड शुरू करें", bmi: "बीएमआई कैलकुलेटर", check: "जांचें", water: "पानी का लक्ष्य", cal: "दैनिक कैलोरी", bmr: "बीएमआर कैलकुलेटर", desc: "आराम के समय की कैलोरी।", foot: "आपका स्वास्थ्य, हमारी प्राथमिकता।" },
        mr: { timer: "व्यायाम टायमर", start: "30 सेकंद सुरू करा", bmi: "बीएमआय कॅल्क्युलेटर", check: "तपासा", water: "पाण्याचे ध्येय", cal: "दररोजची कॅलरी", bmr: "बीएमआर कॅल्क्युलेटर", desc: "विश्रांतीच्या वेळी लागणारी कॅलरी.", foot: "तुमचे आरोग्य, आमची प्राथमिकता." },
        es: { timer: "Temporizador", start: "Iniciar 30 seg", bmi: "Calculadora IMC", check: "Verificar", water: "Meta de Agua", cal: "Calorías Diarias", bmr: "Calculadora TMB", desc: "Calorías en reposo.", foot: "Su salud, nuestra prioridad." }
    };

    const quotes = [
        "Health is Wealth!", "Aapka aaj ka sangharsh kal ki taqat hai.", "Stay Hydrated!", "Consistency is key.", "Keep Moving!"
    ];

    function changeLanguage() {
        let l = document.getElementById('langChanger').value;
        document.getElementById('t-timer').innerText = translations[l].timer;
        document.getElementById('b-timer').innerText = translations[l].start;
        document.getElementById('t-bmi').innerText = translations[l].bmi;
        document.getElementById('b-bmi').innerText = translations[l].check;
        document.getElementById('t-water').innerText = translations[l].water;
        document.getElementById('b-water').innerText = translations[l].check;
        document.getElementById('t-cal').innerText = translations[l].cal;
        document.getElementById('b-cal').innerText = translations[l].check;
        document.getElementById('t-bmr').innerText = translations[l].bmr;
        document.getElementById('b-bmr').innerText = translations[l].check;
        document.getElementById('d-bmr').innerText = translations[l].desc;
        document.getElementById('f-text').innerText = translations[l].foot;
    }

    document.getElementById('quoteText').innerText = quotes[Math.floor(Math.random() * quotes.length)];

    function startWorkout() {
        let s = 30;
        let t = document.getElementById('timer-display');
        let interval = setInterval(() => {
            s--; t.innerText = s;
            if(s <= 0) { clearInterval(interval); alert("Done!"); t.innerText = "30"; }
        }, 1000);
    }

    function calcBMI() {
        let w = document.getElementById('w').value, h = document.getElementById('h').value/100;
        if(w>0 && h>0) document.getElementById('res-bmi').innerText = "Result: " + (w/(h*h)).toFixed(2);
    }

    function calcBMR() {
        let w = document.getElementById('bw').value, h = document.getElementById('bh').value, a = document.getElementById('ba').value;
        if(w>0) document.getElementById('res-bmr').innerText = "BMR: " + (10*w + 6.25*h - 5*a + 5) + " kcal";
    }

    function calcWater() { document.getElementById('res-water').innerText = "Target: 3.5 Liters"; }
    function calcCal() { document.getElementById('res-cal').innerText = "Goal: " + (document.getElementById('cw').value * 30) + " kcal"; }
</script>
</body>
</html>
